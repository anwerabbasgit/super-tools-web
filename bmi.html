        <div class="tool-card">
            <h3><i class="fa-solid fa-heart-pulse"></i> حاسبة مؤشر كتلة الجسم (BMI)</h3>
            <p>أدخل بيانات طولك ووزنك بدقة لحساب المؤشر الصحي المعتمد لتقييم رشاقتك:</p>
            <div class="input-group">
                <input type="number" id="weight" placeholder="الوزن الحالي (بالكيلوغرام)">

            </div>
            <button onclick="calculateBMI()" class="btn-primary" style="margin-top: 15px;">احسب مؤشر الكتلة الفوري</button>
